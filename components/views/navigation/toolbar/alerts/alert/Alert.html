<div class="alert" @click="notificationLink(alert.type)">
  <UiCircle
    :type="alertImage ? 'image' : 'random'"
    :source="alertImage"
    :data-cy="{'circle-without-picture' : !alertImage}"
  />
  <div class="info-container">
    <div class="head">
      <TypographySubtitle :size="6" :text="setTranslateText" />
      <TypographyText :text="$dayjs(alert.at).fromNow()" class="timestamp" />
    </div>
    <TypographyText
      :text="this.alert.description"
      :title="this.alert.description"
      class="description"
    />
  </div>
  <InteractablesClose :action="removeNotification" />
</div>
